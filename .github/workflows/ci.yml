name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tests
        run: dotnet restore StateManagementSharp.Tests/StateManagementSharp.Tests.csproj

      - name: Build library
        run: dotnet build StateManagementSharp/StateManagementSharp.csproj -c Release --no-restore

      - name: Test
        run: dotnet test StateManagementSharp.Tests/StateManagementSharp.Tests.csproj -c Release --no-restore

  sample-build:
    name: Build MAUI sample
    runs-on: macos-26

    env:
      CI_MAUI_VERSION: 10.0.20
      ANDROID_RID: android-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload install maui --skip-manifest-update

      - name: Build Android sample
        run: >
          dotnet build SAMPLE/StateManagementSharp.Sample.Maui/StateManagementSharp.Sample.Maui.csproj
          -f net10.0-android
          -c Release
          -m:1
          -v:n
          -p:UseSharedCompilation=false
          -p:MauiVersion=${{ env.CI_MAUI_VERSION }}
          -p:RuntimeIdentifier=${{ env.ANDROID_RID }}

      - name: Build MAUI integration package (android/ios/maccatalyst)
        run: >
          dotnet build StateManagementSharp.Maui/StateManagementSharp.Maui.csproj
          -c Release
          -m:1
          -p:UseSharedCompilation=false
          -p:MauiVersion=${{ env.CI_MAUI_VERSION }}