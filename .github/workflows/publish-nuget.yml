name: Publish NuGet

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore StateManagementSharp.Tests/StateManagementSharp.Tests.csproj

      - name: Build library
        run: dotnet build StateManagementSharp/StateManagementSharp.csproj -c Release --no-restore

      - name: Test
        run: dotnet test StateManagementSharp.Tests/StateManagementSharp.Tests.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack StateManagementSharp/StateManagementSharp.csproj -c Release -o artifacts /p:ContinuousIntegrationBuild=true

      - name: Push package
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push symbols
        run: dotnet nuget push "artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
